<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;width:100%;height:100%;background:#111;overflow:hidden}video{width:100vw;height:100vh;object-fit:contain;background:#111}</style></head><body><video id="v" muted playsinline preload="auto"></video><script>
const params=new URLSearchParams(location.search); const t=Number(params.get('t')||0); const src=params.get('src'); const v=document.getElementById('v');
v.src=src; v.addEventListener('loadedmetadata',()=>{ v.currentTime=Math.min(Math.max(t,0), Math.max(v.duration-.2,0)); });
v.addEventListener('seeked',()=>{ window.status='ready'; document.body.setAttribute('data-ready','1'); });
</script></body></html>
